<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心間隙｜一條通往內心的秘徑</title>
<meta name="description" content="喧囂的城市裡，有些聲音，只能在安靜的地方被聽見。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #090807;
  --bg2:    #111009;
  --bg3:    #181510;
  --b1:     rgba(255,245,210,0.07);
  --b2:     rgba(255,245,210,0.13);
  --fog:    rgba(255,245,210,0.20);
  --mist:   rgba(255,245,210,0.38);
  --smoke:  rgba(255,245,210,0.58);
  --light:  rgba(255,245,210,0.78);
  --bright: rgba(255,245,210,0.94);
  /* firefly glow */
  --glow-c: #c8e88a;
  --glow:   0 0 8px rgba(180,230,100,0.55), 0 0 20px rgba(160,220,80,0.25);
  --glow2:  0 0 12px rgba(180,230,100,0.7), 0 0 30px rgba(160,220,80,0.35);
  --serif: 'Noto Serif TC', serif;
  --sans:  'Noto Sans TC', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--sans);color:var(--light);-webkit-font-smoothing:antialiased}

/* ── SCREENS ── */
.screen{
  position:fixed;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 1s ease;
  overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1;
}
.screen.active{opacity:1;pointer-events:all}

/* ── FIREFLY BUTTON BASE ── */
.ff{
  background:transparent;border:none;cursor:pointer;
  font-family:var(--sans);
  transition:color 0.45s ease, text-shadow 0.45s ease, border-color 0.45s ease, box-shadow 0.45s ease;
}
.ff:hover,.ff:focus{outline:none}
/* text glow on hover */
.ff-text:hover{ color:var(--glow-c); text-shadow: var(--glow); }
/* bordered glow */
.ff-border{
  border:1px solid var(--b2);
  color:var(--mist);
}
.ff-border:hover{
  color:var(--glow-c);
  border-color:rgba(180,230,100,0.5);
  box-shadow:var(--glow);
  text-shadow: 0 0 8px rgba(180,230,100,0.5);
}
/* nav dot glow */
.ff-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--b2);padding:0;
  transition:background 0.35s, box-shadow 0.35s;
}
.ff-dot:hover,.ff-dot.on{
  background:rgba(180,230,100,0.7);
  box-shadow: 0 0 6px rgba(180,230,100,0.6);
}

/* ══════════════════════════════
   SCREEN 1 · ENTRY
══════════════════════════════ */
#s-entry{
  background:var(--bg);
}
/* video background */
#entry-video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center;
  z-index:0;
  opacity:1;
  transition:opacity 2s ease;
  pointer-events:none;
}
#s-entry.night-mode #entry-video{
  filter:brightness(0.65) saturate(0.7);
}
#s-entry::after{
  content:'';position:absolute;inset:0;
  pointer-events:none;z-index:1;
  background:linear-gradient(
    to bottom,
    rgba(9,8,7,0.55) 0%,
    rgba(9,8,7,0.28) 45%,
    rgba(9,8,7,0.72) 100%
  );
}
.entry-inner{
  position:relative;z-index:3;
  text-align:center;padding:2rem 1.5rem;max-width:500px;
}
.e-brand{
  font-family:var(--sans);font-size:clamp(30px,5.5vw,46px);
  font-weight:500;letter-spacing:0.4em;
  color:var(--bright);margin-bottom:0.55rem;
  opacity:0;animation:up 1.2s 0.3s forwards;
}
.e-tagline{
  font-family:var(--serif);font-size:11px;font-weight:300;
  letter-spacing:0.22em;color:var(--smoke);margin-bottom:3.5rem;
  opacity:0;animation:up 1s 0.75s forwards;
}
.e-poem{
  font-family:var(--serif);font-size:clamp(15px,2.8vw,20px);
  font-weight:300;line-height:2.5;color:var(--smoke);margin-bottom:4rem;
  opacity:0;animation:up 1.2s 1.2s forwards;
}
.e-cta{
  font-size:11px;letter-spacing:0.5em;
  padding:13px 46px;
  opacity:0;animation:up 1s 2.1s forwards;
}
.e-orient{
  font-family:var(--serif);font-size:12px;font-weight:300;
  letter-spacing:0.12em;color:var(--fog);line-height:2;
  margin-bottom:2.5rem;
  opacity:0;animation:up 1s 1.7s forwards;
}
.e-publisher{
  font-family:var(--sans);font-size:10px;
  letter-spacing:0.2em;color:var(--b2);
  margin-top:2.5rem;
  opacity:0;animation:up 0.8s 3s forwards;
}

/* ══════════════════════════════
   PARTICLES (fireflies)
══════════════════════════════ */
#particles{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  overflow:hidden;
}
.particle{
  position:absolute;border-radius:50%;
  background:rgba(180,230,100,0.55);
  animation:float linear infinite;
  filter:blur(1px);
}
@keyframes float{
  0%  {transform:translate(0,0)   scale(1);   opacity:0}
  15% {opacity:1}
  85% {opacity:0.6}
  100%{transform:translate(var(--dx),var(--dy)) scale(0.5); opacity:0}
}

/* ══════════════════════════════
   MIST OVERLAY
══════════════════════════════ */
#mist{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 60%,
    rgba(180,200,150,0.04) 0%,
    transparent 70%);
  animation:mistpulse 9s ease-in-out infinite alternate;
}
@keyframes mistpulse{
  from{opacity:0.6}to{opacity:1}
}

/* ══════════════════════════════
   SCREEN 2 · PATHS
══════════════════════════════ */
#s-paths{background:var(--bg);justify-content:center}
.paths-back{
  position:absolute;top:1.75rem;left:2rem;
  font-size:11px;letter-spacing:0.2em;color:var(--fog);
}
.paths-label{
  font-family:var(--sans);font-size:10px;letter-spacing:0.5em;
  color:var(--mist);margin-bottom:2.5rem;text-align:center;
  opacity:0;animation:up 0.7s 0.15s forwards;
}
.paths-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  max-width:680px;width:90%;
  border:1px solid var(--b1);
  opacity:0;animation:up 0.8s 0.3s forwards;
}
.path-cell{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2.25rem 1rem;cursor:pointer;
  border-right:1px solid var(--b1);
  border-bottom:1px solid var(--b1);
  text-align:center;
  transition:background 0.4s;
  position:relative;overflow:hidden;
}
.path-cell:nth-child(4n){border-right:none}
.path-cell:nth-last-child(-n+4){border-bottom:none}
.path-cell::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(180,230,100,0.08) 0%,transparent 70%);
  opacity:0;transition:opacity 0.5s;
}
.path-cell:hover::after{opacity:1}
.path-cell:hover .path-glyph{filter:drop-shadow(0 0 6px rgba(180,230,100,0.6));opacity:1}
.path-cell:hover .path-name{color:var(--glow-c);text-shadow:var(--glow)}
.path-glyph{font-size:20px;margin-bottom:0.7rem;opacity:0.55;transition:filter 0.4s,opacity 0.4s}
.path-name{
  font-family:var(--serif);font-size:13px;color:var(--mist);
  letter-spacing:0.06em;display:block;
  transition:color 0.4s,text-shadow 0.4s;
}
.path-mood{font-size:10px;color:var(--fog);letter-spacing:0.12em;display:block;margin-top:4px}
.paths-foot{
  position:absolute;bottom:2rem;
  opacity:0;animation:up 0.7s 0.8s forwards;
}

/* ══════════════════════════════
   SCREEN 3 · NODE
══════════════════════════════ */
#s-node{background:var(--bg);justify-content:flex-start;align-items:center}
.node-topbar{
  position:sticky;top:0;z-index:10;width:100%;
  background:rgba(9,8,7,0.92);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--b1);
  padding:1.1rem 2.5rem;
  display:flex;align-items:center;gap:1rem;
}
.node-back{font-size:11px;letter-spacing:0.15em;color:var(--fog)}
.node-top-name{font-family:var(--serif);font-size:14px;color:var(--smoke);letter-spacing:0.05em}
.node-top-theme{font-size:10px;color:var(--fog);letter-spacing:0.15em;margin-left:auto}

.node-body{max-width:580px;width:100%;padding:5rem 2.5rem 8rem}

/* STAGED REVEAL — content fades in piece by piece */
.r1{opacity:0;animation:up 1.1s 0.3s forwards}
.r2{opacity:0;animation:up 1s 1.4s forwards}
.r3{opacity:0;animation:up 0.9s 2.5s forwards}
.r4{opacity:0;animation:up 0.7s 3.3s forwards}   /* book (only on slide 6) */
.r5{opacity:0;animation:up 0.6s 3.6s forwards}   /* explore hint */

.anchor-block{
  font-family:var(--serif);
  font-size:clamp(20px,3.5vw,28px);font-weight:300;
  line-height:2;color:var(--bright);white-space:pre-line;
  margin-bottom:3.5rem;
  padding-left:1.5rem;border-left:1px solid var(--b2);
}
.pause-mark{width:28px;height:1px;background:var(--b2);margin:0 0 3rem}
.obs-block{
  font-family:var(--serif);font-size:15px;font-weight:300;
  line-height:2.2;color:var(--mist);margin-bottom:3rem;
}
.q-wrap{margin-bottom:3.5rem}
.q-pre{font-size:10px;letter-spacing:0.35em;color:var(--fog);display:block;margin-bottom:1rem}
.q-text{
  font-family:var(--serif);font-size:16px;font-weight:300;
  color:var(--light);line-height:2;
  padding:1.5rem 0;
  border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);
}

/* "深入" explore hint — subtle CTA to keep walking */
.explore-hint{
  display:flex;align-items:center;gap:1rem;
  margin-bottom:3rem;
}
.explore-line{flex:1;height:1px;background:var(--b1)}
.explore-btn{
  font-size:11px;letter-spacing:0.25em;color:var(--fog);
  padding:0;
}
.explore-btn:hover{color:var(--glow-c);text-shadow:var(--glow)}

/* BOOK — only on slide 6, deeply quiet */
.book-reveal{margin-bottom:3rem;padding-top:0.5rem}
.book-hint{
  font-size:10px;letter-spacing:0.3em;color:var(--b2);
  display:block;margin-bottom:0.9rem;font-family:var(--sans);
}
.book-links{display:flex;flex-wrap:wrap;gap:8px}
.book-link{
  font-family:var(--serif);font-size:12px;color:var(--fog);
  border:1px solid var(--b1);padding:5px 14px;text-decoration:none;
  letter-spacing:0.05em;
  transition:color 0.4s,border-color 0.4s,text-shadow 0.4s;
}
.book-link:hover{color:var(--glow-c);border-color:rgba(180,230,100,0.3);text-shadow:var(--glow)}

/* ══════════════════════════════
   SCREEN 4 · MAILBOX
══════════════════════════════ */
#s-mailbox{background:var(--bg)}
.mb-inner{
  max-width:520px;width:90%;padding:5rem 0 7rem;
  opacity:0;animation:up 0.8s 0.2s forwards;
}
.mb-back{font-size:11px;letter-spacing:0.2em;color:var(--fog);margin-bottom:3.5rem;display:block}
.mb-title{
  font-family:var(--serif);font-size:22px;font-weight:300;
  color:var(--light);margin-bottom:0.75rem;letter-spacing:0.05em;
}
.mb-sub{
  font-family:var(--serif);font-size:14px;font-weight:300;
  color:var(--mist);line-height:2.1;margin-bottom:2.5rem;
}
.mb-textarea{
  width:100%;min-height:120px;background:var(--bg2);
  border:1px solid var(--b1);font-family:var(--serif);
  font-size:14px;color:var(--light);padding:1.25rem 1.5rem;
  resize:vertical;outline:none;line-height:1.9;border-radius:0;
  transition:border-color 0.35s;
}
.mb-textarea:focus{border-color:rgba(180,230,100,0.3);box-shadow:0 0 0 1px rgba(180,230,100,0.08)}
.mb-textarea::placeholder{color:var(--fog)}
.mb-send{
  font-family:var(--sans);font-size:11px;letter-spacing:0.3em;
  color:var(--bg);background:rgba(200,232,138,0.75);
  padding:12px 32px;margin-top:1rem;
  transition:background 0.35s,box-shadow 0.35s;
}
.mb-send:hover{background:rgba(200,232,138,0.95);box-shadow:var(--glow)}
.mb-send:disabled{background:var(--b2);cursor:not-allowed;box-shadow:none}
.mb-resp{margin-top:3rem;padding-top:2rem;border-top:1px solid var(--b1);display:none}
.mb-resp.show{display:block;animation:up 0.8s forwards}
.mb-resp-label{font-size:10px;letter-spacing:0.35em;color:var(--fog);display:block;margin-bottom:1.5rem}
.mb-resp-text{
  font-family:var(--serif);font-size:15px;font-weight:300;
  color:var(--smoke);line-height:2.2;white-space:pre-line;
}
.tcursor::after{content:'|';animation:blink 0.9s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── UTILS ── */
@keyframes up{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@media(max-width:580px){
  .paths-grid{grid-template-columns:repeat(2,1fr)}
  .path-cell{padding:2rem 0.75rem}
  .path-cell:nth-child(4n){border-right:1px solid var(--b1)}
  .path-cell:nth-child(2n){border-right:none}
  .path-cell:nth-last-child(-n+4){border-bottom:1px solid var(--b1)}
  .path-cell:nth-last-child(-n+2){border-bottom:none}
  .node-body{padding:2.5rem 1.25rem 6rem}
  .node-topbar{padding:0.9rem 1.25rem;gap:0.75rem}
  .anchor-block{font-size:19px}
  .mb-inner{padding:2.5rem 0 5rem}
  .node-note-footer{flex-direction:column;gap:1rem;align-items:flex-start}
  .node-note-divider{width:24px;height:1px}
  .explore-hint{margin:2.5rem 0}
}

/* ══════════════════════════════
   RANDOM NOTE SYSTEM
══════════════════════════════ */
#s-note{background:var(--bg)}
.note-inner{
  max-width:500px;width:90%;padding:5rem 0 6rem;
  opacity:0;animation:up 0.9s 0.15s forwards;
  text-align:center;
}
.note-eyebrow{
  font-size:10px;letter-spacing:0.45em;color:var(--fog);
  display:block;margin-bottom:3rem;
}
.note-paper{
  border:1px solid var(--b2);padding:3rem 2.5rem;
  margin-bottom:2.5rem;position:relative;
  opacity:0;animation:up 0.9s 0.5s forwards;
}
.note-paper::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:40px;height:1px;background:var(--bg);
}
.note-text{
  font-family:var(--serif);font-size:17px;font-weight:300;
  color:var(--light);line-height:2.2;white-space:pre-line;
  margin-bottom:1.5rem;
}
.note-src{font-size:11px;color:var(--fog);letter-spacing:0.1em;font-style:italic}
.note-actions{
  display:flex;align-items:center;justify-content:center;gap:2rem;
  opacity:0;animation:up 0.7s 1.2s forwards;
}
.note-save-btn{
  font-size:11px;letter-spacing:0.25em;
  padding:9px 26px;
}
.note-saved-msg{
  font-size:11px;color:var(--glow-c);letter-spacing:0.15em;
  text-shadow:var(--glow);display:none;
}

/* SAVED NOTES drawer */
#s-saved{background:var(--bg)}
.saved-inner{
  max-width:520px;width:90%;padding:4rem 0 7rem;
  opacity:0;animation:up 0.8s 0.2s forwards;
}
.saved-back{font-size:11px;letter-spacing:0.2em;color:var(--fog);margin-bottom:3rem;display:block}
.saved-title{
  font-family:var(--serif);font-size:20px;font-weight:300;
  color:var(--light);margin-bottom:0.5rem;letter-spacing:0.05em;
}
.saved-sub{font-size:12px;color:var(--fog);letter-spacing:0.1em;margin-bottom:2.5rem}
.saved-empty{font-family:var(--serif);font-size:14px;color:var(--fog);font-style:italic}
.saved-list{display:flex;flex-direction:column;gap:1.5rem}
.saved-item{
  border:1px solid var(--b1);padding:1.5rem;
  position:relative;
}
.saved-item-text{
  font-family:var(--serif);font-size:14px;font-weight:300;
  color:var(--smoke);line-height:2;white-space:pre-line;
  margin-bottom:0.5rem;
}
.saved-item-src{font-size:10px;color:var(--fog);letter-spacing:0.08em;font-style:italic}
.saved-item-del{
  position:absolute;top:0.75rem;right:1rem;
  font-size:10px;letter-spacing:0.1em;color:var(--b2);
  background:none;border:none;cursor:pointer;font-family:var(--sans);
  transition:color 0.3s;
}
.saved-item-del:hover{color:var(--fog)}


/* layer swap styles */
.obs-as-anchor {
  font-family:var(--serif);
  font-size:clamp(16px,2.8vw,22px);
  font-weight:300;
  line-height:2.2;
  color:var(--smoke);
  white-space:pre-line;
  margin-bottom:3.5rem;
  padding-left:1.5rem;
  border-left:1px solid var(--b1);
}
.anchor-as-obs {
  font-family:var(--serif);
  font-size:clamp(19px,3.2vw,26px);
  font-weight:300;
  line-height:2;
  color:var(--bright);
  white-space:pre-line;
  margin-bottom:3rem;
}

/* note discovery footer — inside node, always present */
.node-note-footer {
  margin-top: 5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--b1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  animation: up 0.6s 4s forwards;
}
.node-note-footer .nf-left {
  display: flex; gap: 1.5rem; align-items: center;
}
.node-note-btn {
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--fog);
  transition: color 0.4s, text-shadow 0.4s;
  padding: 0;
}
.node-note-btn:hover {
  color: var(--glow-c);
  text-shadow: var(--glow);
}
.node-note-divider {
  width: 1px; height: 12px;
  background: var(--b1);
}

/* ── TOUCH DEVICE OVERRIDES ──
   hover:none = touchscreen — all interactive elements show at full brightness,
   key action buttons show in firefly green permanently */


/* ══════════════════════════════
   TABLET — 769px to 1100px, hover:hover（滑鼠設備但中等螢幕）
   補足平板亮度，不影響手機與桌機
══════════════════════════════ */
@media (min-width: 769px) and (max-width: 1100px) {
  .path-glyph { opacity: 1 !important; font-size: 24px !important; }
  .path-name  { font-size: 14px !important; color: rgba(240,235,224,0.88) !important; }
  .path-mood  { font-size: 11px !important; color: rgba(240,235,224,0.52) !important; }
  .explore-btn {
    color: #c8e88a !important;
    text-shadow: 0 0 8px rgba(180,230,100,0.6) !important;
    font-size: 13px !important;
  }
  .node-note-btn {
    color: rgba(200,232,138,0.85) !important;
    font-size: 12px !important;
  }
  .obs-as-anchor { color: rgba(240,235,224,0.70) !important; }
  .anchor-as-obs { color: rgba(240,235,224,0.92) !important; }
  .q-text        { color: rgba(240,235,224,0.80) !important; }
  .ff-border     { color: rgba(240,235,224,0.88) !important; border-color: rgba(240,235,224,0.35) !important; }
  .book-link     { color: rgba(240,235,224,0.62) !important; border-color: rgba(240,235,224,0.18) !important; }
  .mb-title      { color: rgba(240,235,224,0.88) !important; }
  .mb-sub        { color: rgba(240,235,224,0.56) !important; }
  .mb-resp-text  { color: rgba(240,235,224,0.70) !important; }
  .node-back, .paths-back, .mb-back, .saved-back {
    color: rgba(240,235,224,0.70) !important;
  }
}

/* ══════════════════════════════
   TOUCH & MOBILE — appended last for highest priority
   Covers both hover:none devices AND small screens
══════════════════════════════ */

/* Path grid nodes — always bright on touch */
@media (hover: none), (max-width: 768px) {
  .path-glyph {
    opacity: 1 !important;
    font-size: 26px !important;
  }
  .path-name {
    font-size: 15px !important;
    color: #f0ebe0 !important;
  }
  .path-mood {
    font-size: 12px !important;
    color: rgba(240,235,224,0.55) !important;
  }
}

/* Key action buttons — firefly green, always visible */
@media (hover: none), (max-width: 768px) {
  button.explore-btn,
  .explore-btn {

<script>
/* ═══════════════════════════
   AMBIENT SOUND
═══════════════════════════ */
let audioCtx = null;
let soundOn = false;
let currentSoundNodes = []; // 當前播放的音效節點，用來停止

function stopCurrentSound() {
  currentSoundNodes.forEach(n => { try { n.stop(); } catch(e){} });
  currentSoundNodes = [];
}

function initAudio(nodeIndex) {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } else {
    stopCurrentSound();
  }
  if (nodeIndex === undefined) {
    makeEntrySound();
  } else {
    makeNodeSound(nodeIndex);
  }
  soundOn = true;
}

// 建立粉紅噪音緩衝
function makePinkNoise(sr, secs) {
  const size = sr * secs;
  const buf = audioCtx.createBuffer(1, size, sr);
  const d = buf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
  for (let i = 0; i < size; i++) {
    const w = Math.random()*2-1;
    b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
    b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
    b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+w*0.5362)*0.11;
  }
  return buf;
}

// 建立白噪音緩衝
function makeWhiteNoise(sr, secs) {
  const size = sr * secs;
  const buf = audioCtx.createBuffer(1, size, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < size; i++) d[i] = Math.random()*2-1;
  return buf;
}

// 通用：建立一個循環噪音層
function noiseLayer(buf, lpFreq, lpQ, gainVal, master) {
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.loop = true;
  src.loopStart = Math.random() * (buf.duration * 0.5);
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'bandpass'; lp.frequency.value = lpFreq; lp.Q.value = lpQ;
  const g = audioCtx.createGain(); g.gain.value = gainVal;
  src.connect(lp); lp.connect(g); g.connect(master);
  src.start();
  currentSoundNodes.push(src);
  return g;
}

// 通用：稀疏鳥叫
function sparseBirds(master, interval_min, interval_max, vol) {
  const types = [
    {start:1800,end:2400,dur:0.22},{start:2200,end:1600,dur:0.28},
    {start:1600,end:2000,dur:0.15},{start:2000,end:2200,dur:0.35},
  ];
  function call() {
    const t = audioCtx.currentTime;
    const type = types[Math.floor(Math.random()*types.length)];
    const osc = audioCtx.createOscillator(); osc.type='sine';
    const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=3000;
    const env = audioCtx.createGain(); env.gain.value=0;
    osc.connect(lp); lp.connect(env); env.connect(master);
    const n = Math.floor(1+Math.random()*2);
    for(let i=0;i<n;i++){
      const nt=t+i*(type.dur+0.1+Math.random()*0.1);
      const pv=(Math.random()-0.5)*200;
      osc.frequency.setValueAtTime(type.start+pv,nt);
      osc.frequency.linearRampToValueAtTime(type.end+pv,nt+type.dur);
      const pk=vol*(0.8+Math.random()*0.4);
      env.gain.setValueAtTime(0,nt);
      env.gain.linearRampToValueAtTime(pk,nt+0.03);
      env.gain.linearRampToValueAtTime(0,nt+type.dur);
    }
    osc.start(t); osc.stop(t+n*(type.dur+0.15)+0.3);
    currentSoundNodes.push(osc);
    setTimeout(call, (interval_min + Math.random()*(interval_max-interval_min))*1000);
  }
  setTimeout(call, (5+Math.random()*10)*1000);
}

// 通用：蟲鳴層
function insectLayer(master, freq, vol) {
  const osc = audioCtx.createOscillator(); osc.type='sine'; osc.frequency.value=freq;
  const lfo = audioCtx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.8+Math.random()*1.2;
  const lfoD = audioCtx.createGain(); lfoD.gain.value=0.002;
  lfo.connect(lfoD);
  const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=freq*1.3; lp.Q.value=0.5;
  const env = audioCtx.createGain(); env.gain.value=0;
  lfoD.connect(env.gain);
  osc.connect(lp); lp.connect(env); env.connect(master);
  osc.start(); lfo.start();
  currentSoundNodes.push(osc); currentSoundNodes.push(lfo);
  function breath() {
    const t=audioCtx.currentTime;
    const on=15+Math.random()*20, off=8+Math.random()*15;
    const pk=vol*(0.8+Math.random()*0.4);
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(pk,t+5);
    env.gain.linearRampToValueAtTime(pk*0.7,t+on*0.8);
    env.gain.linearRampToValueAtTime(0,t+on);
    setTimeout(breath,(on+off)*1000);
  }
  setTimeout(breath, 3000+Math.random()*5000);
}

// ── 入口音景（原本的完整版）──
function makeEntrySound() {
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.22, audioCtx.currentTime+5);
  master.connect(audioCtx.destination);
  const sr=audioCtx.sampleRate;
  const pink=makePinkNoise(sr,8);
  noiseLayer(pink,600,0.6,0.5,master);
  noiseLayer(pink,250,0.6,0.4,master);
  noiseLayer(pink,90,0.6,0.3,master);
  [1100,1350,1600,1850].forEach(f=>insectLayer(master,f,0.003));
  sparseBirds(master,35,90,0.055);
}

// ── 節點音景 ──
function makeNodeSound(idx) {
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime+4);
  master.connect(audioCtx.destination);
  const sr=audioCtx.sampleRate;

  switch(idx) {
    case 0: { // 霧徑 — 極淡風聲 + 偶爾葉沙沙
      const w=makeWhiteNoise(sr,6);
      noiseLayer(w,200,0.3,0.12,master); // 低頻風
      noiseLayer(w,800,0.8,0.06,master); // 葉沙沙
      // 偶爾葉片陣風
      function gust(){
        const t=audioCtx.currentTime;
        const g=audioCtx.createGain(); g.gain.value=0;
        const src=audioCtx.createBufferSource(); src.buffer=makeWhiteNoise(sr,2);
        const lp=audioCtx.createBiquadFilter(); lp.type='bandpass'; lp.frequency.value=600; lp.Q.value=0.5;
        src.connect(lp); lp.connect(g); g.connect(master);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.08,t+0.4);
        g.gain.linearRampToValueAtTime(0,t+1.8);
        src.start(t); src.stop(t+2);
        currentSoundNodes.push(src);
        setTimeout(gust,(12+Math.random()*20)*1000);
      }
      setTimeout(gust,8000);
      break;
    }
    case 1: { // 月湖 — 靜夜，極輕蟲鳴
      [1200,1500].forEach(f=>insectLayer(master,f,0.002));
      // 偶爾遠處青蛙
      function frog(){
        const t=audioCtx.currentTime;
        const osc=audioCtx.createOscillator(); osc.type='sine'; osc.frequency.value=300+Math.random()*60;
        const env=audioCtx.createGain(); env.gain.value=0;
        osc.connect(env); env.connect(master);
        env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.025,t+0.05);
        env.gain.linearRampToValueAtTime(0,t+0.25);
        osc.start(t); osc.stop(t+0.3);
        currentSoundNodes.push(osc);
        setTimeout(frog,(20+Math.random()*40)*1000);
      }
      setTimeout(frog,15000);
      break;
    }
    case 2: { // 老樹下 — 稀疏鳥叫 + 微風葉動
      const w=makeWhiteNoise(sr,5);
      noiseLayer(w,500,0.5,0.05,master);
      sparseBirds(master,15,35,0.04);
      break;
    }
    case 3: { // 微光屋 — 幾乎靜音，偶爾燭火劈啪
      function crackle(){
        const t=audioCtx.currentTime;
        const osc=audioCtx.createOscillator(); osc.type='sawtooth';
        osc.frequency.value=80+Math.random()*40;
        const lp=audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=300;
        const env=audioCtx.createGain(); env.gain.value=0;
        osc.connect(lp); lp.connect(env); env.connect(master);
        env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.015,t+0.01);
        env.gain.linearRampToValueAtTime(0,t+0.08);
        osc.start(t); osc.stop(t+0.1);
        currentSoundNodes.push(osc);
        setTimeout(crackle,(3+Math.random()*8)*1000);
      }
      setTimeout(crackle,4000);
      break;
    }
    case 4: { // 雨亭 — 雨聲為主
      const w=makeWhiteNoise(sr,8);
      noiseLayer(w,1200,0.4,0.35,master); // 雨聲主體
      noiseLayer(w,400,0.3,0.15,master);  // 低頻雨打地
      noiseLayer(w,3000,1.2,0.08,master); // 細雨噴濺
      break;
    }
    case 5: { // 觀星台 — 高處風聲，空曠
      const w=makeWhiteNoise(sr,7);
      noiseLayer(w,150,0.25,0.14,master); // 深沉風
      noiseLayer(w,400,0.4,0.06,master);  // 風刮過
      // 偶爾風切聲
      function windgust(){
        const t=audioCtx.currentTime;
        const g=audioCtx.createGain(); g.gain.value=0;
        const src=audioCtx.createBufferSource(); src.buffer=makeWhiteNoise(sr,3);
        const lp=audioCtx.createBiquadFilter(); lp.type='bandpass'; lp.frequency.value=300; lp.Q.value=0.3;
        src.connect(lp); lp.connect(g); g.connect(master);
        const dur=2+Math.random()*2;
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.1,t+dur*0.4);
        g.gain.linearRampToValueAtTime(0,t+dur);
        src.start(t); src.stop(t+dur+0.1);
        currentSoundNodes.push(src);
        setTimeout(windgust,(10+Math.random()*20)*1000);
      }
      setTimeout(windgust,6000);
      break;
    }
    case 6: { // 溫室 — 室內感，偶爾水滴
      const p=makePinkNoise(sr,5);
      noiseLayer(p,300,0.3,0.06,master); // 室內底噪
      function drip(){
        const t=audioCtx.currentTime;
        const osc=audioCtx.createOscillator(); osc.type='sine';
        osc.frequency.setValueAtTime(1200+Math.random()*400,t);
        osc.frequency.exponentialRampToValueAtTime(400,t+0.15);
        const env=audioCtx.createGain(); env.gain.value=0;
        osc.connect(env); env.connect(master);
        env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.03,t+0.01);
        env.gain.linearRampToValueAtTime(0,t+0.15);
        osc.start(t); osc.stop(t+0.2);
        currentSoundNodes.push(osc);
        setTimeout(drip,(5+Math.random()*12)*1000);
      }
      setTimeout(drip,3000);
      break;
    }
    case 7: { // 溪谷 — 緩緩流水
      const p=makePinkNoise(sr,8);
      noiseLayer(p,600,0.6,0.45,master);
      noiseLayer(p,250,0.5,0.3,master);
      noiseLayer(p,100,0.4,0.2,master);
      break;
    }
  }
}

function updateDayNight() {
  const h = new Date().getHours();
  const entry = document.getElementById('s-entry');
  if (h >= 18 || h < 6) {
    entry.classList.add('night-mode');
  } else {
    entry.classList.remove('night-mode');
  }
}
updateDayNight();
setInterval(updateDayNight, 60000);

/* ═══════════════════════════

═══════════════════════════ */
(function(){
  const vid = document.getElementById('entry-video');
  if (!vid) return;

  // Fallback: if video can't load, show static dark bg gracefully
  vid.addEventListener('error', () => {
    vid.style.display = 'none';
    document.getElementById('s-entry').style.background =
      'var(--bg) url("background.jpg") center 42% / cover no-repeat';
  });

  // Pause video when not on entry screen to save resources
  const origGoTo = window.goTo;
  if (typeof origGoTo === 'function') {
    window.goTo = function(id) {
      if (id === 's-entry') {
        vid.play().catch(()=>{});
      } else {
        vid.pause();
      }
      origGoTo(id);
    };
  }
})();

/* ═══════════════════════════
   FIREFLY PARTICLES
═══════════════════════════ */
function spawnParticles() {
  const container = document.getElementById('particles');
  const count = 22;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 3;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${20 + Math.random()*75}%;
      --dx:${(Math.random()-0.5)*180}px;
      --dy:${-80 - Math.random()*200}px;
      animation-duration:${8 + Math.random()*14}s;
      animation-delay:${Math.random()*10}s;
      opacity:0;
    `;
    container.appendChild(p);
  }
}
spawnParticles();

      { anchor:'你以為你在找路。也許路也在找你。', obs:'這裡的樹，比你老。它見過很多走進霧裡的人，沒有一個是空手來的。', q:'你有沒有一個感覺，一直跟著你，但你還沒有轉頭看它？' },

      { anchor:'你不需要知道別人走到哪裡。你只需要知道你在哪裡。', obs:'霧裡的路，今天走的人比較多。但每個人都走自己的，互相看不見。', q:'你現在在哪裡？不是地方，是狀態。' },

/* ═══════════════════════════
   NAV
═══════════════════════════ */
let navStack = [];

// Push a dummy history entry so browser back button fires popstate
function goTo(id, push=true) {
  const cur = document.querySelector('.screen.active');
  if (push && cur && cur.id !== id) {
    navStack.push(cur.id);
    history.pushState({ screen: id }, '');
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const next = document.getElementById(id);
  next.classList.add('active');
  next.scrollTop = 0;
  if (id === 's-mailbox') {
    const el = next.querySelector('.mb-inner');
    el.style.animation='none'; el.offsetHeight; el.style.animation='';
  }
  if (!soundOn) { try { initAudio(undefined); } catch(e){} }
}
function goBack(){
  const prev = navStack.pop() || 's-entry';
  goTo(prev, false);
}
// Intercept browser back button
window.addEventListener('popstate', function(e) {
  if (navStack.length > 0) {
    const prev = navStack.pop();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const next = document.getElementById(prev);
    next.classList.add('active');
    next.scrollTop = 0;
  } else {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('s-entry').classList.add('active');
  }
});

/* ═══════════════════════════
   PATHS
═══════════════════════════ */
function buildPaths(){
  const g = document.getElementById('pathsGrid');
  NODES.forEach((n,i)=>{
    const d = document.createElement('div');
    d.className = 'path-cell';
    d.innerHTML = `<span class="path-glyph">${n.icon}</span>
      <span class="path-name">${n.name}</span>
      <span class="path-mood">${n.theme}</span>`;
    d.onclick = ()=> openNode(i);
    g.appendChild(d);
  });
}

/* ═══════════════════════════
   NODE  — day-of-week, no prev/next arrows visible by default
   "深入" button reveals the next slide as if going deeper
═══════════════════════════ */
let curNode=0, curSlide=0, entrySlide=0;

function openNode(i){
  curNode=i;
  const dow = new Date().getDay();
  const weekIdx = dow===0 ? 6 : dow-1;
  entrySlide = weekIdx % NODES[i].weeks[weekIdx].length;
  curSlide = entrySlide;
  renderNode();
  // 先啟動音效（在點擊事件鏈內），再切換畫面
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } else if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    stopCurrentSound();
    makeNodeSound(i);
    soundOn = true;
  } catch(e){}
  goTo('s-node');
}

function renderNode(){
  const n = NODES[curNode];
  const dow = new Date().getDay();
  const weekIdx = dow===0 ? 6 : dow-1;
  const slides = n.weeks[weekIdx];
  const s = slides[curSlide];
  const isLast = curSlide === slides.length - 1;
  // Get books from the path's last slide so all slides can reference them
  const pathBooks = slides[slides.length - 1].books || [];
  const showBooks = isLast && pathBooks.length > 0;
  const showBookHint = !isLast && curSlide >= 2 && pathBooks.length > 0;
  const hasNext = curSlide < slides.length - 1;

  document.getElementById('nodeTopName').textContent = n.icon + '\u2002' + n.name;
  document.getElementById('nodeTopTheme').textContent = n.theme;

  // Show question only on slides 2 and 5 (0-indexed: 1 and 4)
  // gives a "found something" feeling, not every slide
  const showQ = (curSlide === 1 || curSlide === 4);

  const qHtml = showQ
    ? `<div class="r3">
        <div class="q-wrap">
          <span class="q-pre">停 在 這 裡 一 下</span>
          <p class="q-text">${s.q}</p>
        </div>
       </div>` : '';

  const booksHtml = showBooks
    ? `<div class="book-reveal r4">
        <span class="book-hint">這 些 文 字 來 自</span>
        <div class="book-links">
          ${pathBooks.map(b=>`<a class="book-link ff" href="${PUB}" target="_blank" rel="noopener">${b}</a>`).join('')}
        </div>
       </div>` : (showBookHint
    ? `<div class="book-reveal r4" style="opacity:0;animation:up 0.6s 3.8s forwards">
        <span class="book-hint" style="color:var(--b2)">↳ 有人把這條路走成了文字</span>
        <div class="book-links">
          ${pathBooks.map(b=>`<a class="book-link ff" href="${PUB}" target="_blank" rel="noopener" style="opacity:0.6">${b}</a>`).join('')}
        </div>
       </div>` : '');

  // "deeper" — text changes per depth to feel like discovering more, not paginating
  const deeperLabels = [
    '再 走 深 一 點',
    '繼 續 往 裡 走',
    '還 有 更 深 處',
    '再 多 走 一 步',
    '最 後 一 個 角 落',
  ];
  const deeperHtml = hasNext
    ? `<div class="explore-hint r5">
        <div class="explore-line"></div>
        <button class="ff ff-text explore-btn" onclick="deeperSlide()">${deeperLabels[Math.min(curSlide, deeperLabels.length-1)]} →</button>
        <div class="explore-line"></div>
       </div>` : '';

  const backHint = (curSlide > 0)
    ? `<div style="text-align:right;margin-bottom:2rem;opacity:0;animation:up 0.5s 0.1s forwards">
        <button class="ff ff-text" style="font-size:10px;letter-spacing:0.15em;color:var(--b2)"
          onclick="shallowerSlide()">← 退回上一個角落</button>
       </div>` : '';

  // LAYER ORDER: obs (poetic/atmospheric) first, then anchor (direct), then q
  // This means you enter atmosphere before you encounter the direct statement
  document.getElementById('nodeBody').innerHTML = `
    ${backHint}
    <div class="r1"><div class="anchor-block obs-as-anchor">${s.obs.replace(/\n/g,'<br>')}</div></div>
    <div class="r2"><div class="pause-mark"></div><div class="obs-block anchor-as-obs">${s.anchor.replace(/\n/g,'<br>')}</div></div>
    ${qHtml}
    ${booksHtml}
    ${deeperHtml}
    <div class="node-note-footer">
      <button class="ff node-note-btn" onclick="showRandomNote()">✦ 撿 一 張 紙 條</button>
      <div class="node-note-divider"></div>
      <button class="ff node-note-btn" onclick="openSaved()">◦ 口 袋 裡 的 紙 條</button>
    </div>
  `;
  document.getElementById('s-node').scrollTop = 0;
}

function deeperSlide(){
  const dow = new Date().getDay();
  const weekIdx = dow===0 ? 6 : dow-1;
  const slides = NODES[curNode].weeks[weekIdx];
  if (curSlide < slides.length-1){ curSlide++; renderNode(); }
}
function shallowerSlide(){
  if (curSlide > 0){ curSlide--; renderNode(); }
}

/* ═══════════════════════════
   MAILBOX
═══════════════════════════ */
async function sendMailbox(){
  const input=document.getElementById('mbInput').value.trim();
  if(!input)return;
  const btn=document.getElementById('mbBtn');
  btn.disabled=true; btn.textContent='花園正在聆聽…';
  const resp=document.getElementById('mbResp');
  const respText=document.getElementById('mbRespText');
  resp.classList.add('show');
  respText.classList.add('tcursor'); respText.textContent='';

  const system = `你是「心間隙花園」的回聲。讓投入心事的人感覺被聽見，而不是被分析。不要給建議，不說「你應該」。說出他可能沒說完的感受，最後留一個輕輕的問題。語氣像深夜的信，溫柔不甜膩。100-150字繁體中文純文字，禁用：靈魂、宇宙、光芒、綻放、昇華、療癒。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: system,
        messages: [
          { role: 'user', content: `讀者的心事：${input}` }
        ]
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const text = data.content?.[0]?.text?.trim();
    if (!text || text.length < 5) throw new Error('empty');
    respText.classList.remove('tcursor');
    await typewrite(respText, text);
  } catch(e) {
    console.error('API error:', e);
    respText.classList.remove('tcursor');
    respText.textContent = '花園暫時無法回應。但你說的話，已經落在這裡了。';
  }

  btn.disabled=false; btn.textContent='再 投 一 張';
  const bookHint = document.getElementById('mbBookHint');
  if(bookHint){
    bookHint.style.display='block';
    bookHint.style.animation='none'; bookHint.offsetHeight; bookHint.style.animation='up 0.8s forwards';
    // Use path-specific books if a path is active, else fall back to curated selection
    const pathBookMap = {
      0: ['《做自己》','《自己站起來》'],          // 霧徑
      1: ['《做自己》','《自己站起來》'],          // 月湖
      2: ['《如何愛你的父母》'],                  // 老樹下
      3: ['《追愛》','《有情人》'],               // 微光屋
      4: ['《離婚黑皮書》','《我是如何失敗的》'],  // 雨亭
      5: ['《做自己》','《我是如何失敗的》'],      // 觀星台
      6: ['《說話的藝術》','《如何撒嬌》'],       // 溫室
      7: ['《自己站起來》','《做自己》'],          // 溪谷
    };
    const suggested = (curNode !== undefined && pathBookMap[curNode])
      ? pathBookMap[curNode]
      : ['《做自己》','《自己站起來》','《追愛》'];
    document.getElementById('mbBookLinks').innerHTML = suggested.map(b=>
      `<a class="book-link ff" href="https://pia640210.github.io/creative-publisher/" target="_blank" rel="noopener">${b}</a>`
    ).join('');
  }
}
async function typewrite(el,text){
  el.textContent='';
  for(let i=0;i<text.length;i++){
    el.textContent+=text[i];
    await new Promise(r=>setTimeout(r,26));
  }
}

let currentNote = null;

function showRandomNote(){
  const idx = Math.floor(Math.random() * NOTES.length);
  currentNote = NOTES[idx];
  document.getElementById('noteText').textContent = currentNote.text;
  document.getElementById('noteSrc').textContent = '— ' + currentNote.src;
  document.getElementById('noteSavedMsg').style.display = 'none';
  // re-trigger note paper animation
  const paper = document.querySelector('.note-paper');
  paper.style.animation='none'; paper.offsetHeight; paper.style.animation='';
  goTo('s-note');
}

function saveNote(){
  if(!currentNote) return;
  const saved = JSON.parse(localStorage.getItem('xinjianci_notes') || '[]');
  // avoid exact duplicate
  if(!saved.find(n => n.text === currentNote.text)){
    saved.unshift(currentNote);
    localStorage.setItem('xinjianci_notes', JSON.stringify(saved));
  }
  const msg = document.getElementById('noteSavedMsg');
  msg.style.display = 'inline';
  setTimeout(()=>{ msg.style.display='none'; }, 2200);
}

function openSaved(){
  const saved = JSON.parse(localStorage.getItem('xinjianci_notes') || '[]');
  const list = document.getElementById('savedList');
  if(saved.length === 0){
    list.innerHTML = '<p class="saved-empty">你還沒有收藏任何紙條。<br>在花園裡漫步，遇到的時候，可以收進口袋。</p>';
  } else {
    list.innerHTML = saved.map((n,i)=>`
      <div class="saved-item" id="saved-${i}">
        <p class="saved-item-text">${n.text}</p>
        <span class="saved-item-src">— ${n.src}</span>
        <button class="saved-item-del ff" onclick="deleteNote(${i})">移 除</button>
      </div>`).join('');
  }
  goTo('s-saved');
}

function deleteNote(i){
  const saved = JSON.parse(localStorage.getItem('xinjianci_notes') || '[]');
  saved.splice(i,1);
  localStorage.setItem('xinjianci_notes', JSON.stringify(saved));
  openSaved();
}


/* ═══════════════════════════
   VOICE INPUT
═══════════════════════════ */
let recognition = null;
let isListening = false;

function toggleVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    const status = document.getElementById('mbVoiceStatus');
    status.style.display = 'block';
    status.textContent = '你的瀏覽器不支援語音輸入';
    setTimeout(() => { status.style.display = 'none'; }, 2500);
    return;
  }
  if (isListening) {
    recognition.stop();
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-TW';
  recognition.continuous = false;
  recognition.interimResults = true;
  const mic = document.getElementById('mbMic');
  const status = document.getElementById('mbVoiceStatus');
  const input = document.getElementById('mbInput');

  recognition.onstart = () => {
    isListening = true;
    mic.style.color = 'var(--glow-c)';
    mic.style.textShadow = 'var(--glow)';
    status.style.display = 'block';
    status.textContent = '正 在 聆 聽…';
  };
  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (final) {
      input.value = (input.value + ' ' + final).trim();
      status.textContent = '已 收 到';
    } else {
      status.textContent = interim || '正 在 聆 聽…';
    }
  };
  recognition.onerror = (e) => {
    status.textContent = e.error === 'not-allowed' ? '請 允 許 麥 克 風 權 限' : '語 音 輸 入 失 敗';
    setTimeout(() => { status.style.display = 'none'; }, 2500);
  };
  recognition.onend = () => {
    isListening = false;
    mic.style.color = 'var(--fog)';
    mic.style.textShadow = 'none';
    setTimeout(() => { status.style.display = 'none'; }, 1500);
  };
  recognition.start();
}
