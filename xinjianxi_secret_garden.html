<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心間隙 | 城市裡的微光秘境</title>
    <style>
        /* 基礎設定與視覺氛圍：深綠/深藍的夜間生態感 */
        :root {
            --bg-color: #0c1612; /* 極深的沉靜苔綠黑色 */
            --text-primary: #e3ece7; /* 柔和的微光白 */
            --text-dim: #829489; /* 帶著植物感度的暗綠灰 */
            --accent-glow: rgba(163, 218, 183, 0.25); /* 輕盈的螢光綠波 */
            --accent-solid: #a3dba3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "Noto Serif TC", "Noto Serif CJK TC", "PMingLiU", "宋體", serif; /* 傳統明體帶來沉靜、靈性的文學氣息 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            letter-spacing: 0.15em;
            line-height: 1.8;
            position: relative;
        }

        /* 背景微光呼吸效果與有機水波感 */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .light-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70vw;
            height: 70vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.4;
            animation: breathe 12s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.6; }
        }

        /* 內容主要容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 650px;
            width: 85%;
            text-align: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            position: absolute;
        }

        .visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
            position: relative;
        }

        /* 頂部標題與意象 */
        h1 {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 3.5rem;
            text-transform: uppercase;
            font-weight: 300;
        }

        .prompt-text {
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            color: var(--text-primary);
        }

        /* 情緒標籤格線：如微風吹落的落葉 */
        .emotion-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 3rem;
        }

        .emotion-btn {
            background: transparent;
            border: 1px solid rgba(130, 148, 137, 0.4);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.1em;
        }

        .emotion-btn:hover {
            border-color: var(--text-primary);
            box-shadow: 0 0 20px rgba(163, 218, 183, 0.3);
            background-color: rgba(255, 255, 255, 0.03);
        }

        /* 傾訴輸入區 */
        .input-area {
            margin-top: 3rem;
            border-top: 1px solid rgba(130, 148, 137, 0.15);
            padding-top: 2.5rem;
        }

        .input-instruction {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(130, 148, 137, 0.4);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            padding: 12px;
            resize: none;
            outline: none;
            transition: border-color 0.4s ease;
            text-align: center;
        }

        textarea:focus {
            border-bottom: 1px solid var(--text-primary);
        }

        textarea::placeholder {
            color: rgba(130, 148, 137, 0.4);
        }

        .submit-btn {
            margin-top: 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.4s ease;
        }

        .submit-btn:hover {
            color: var(--text-primary);
            text-shadow: 0 0 8px var(--text-primary);
        }

        /* 沉澱過渡狀態 */
        .transition-text {
            color: var(--text-dim);
            font-size: 1rem;
            letter-spacing: 0.3em;
            animation: pulse 2.5s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            100% { opacity: 0.8; transform: scale(1.02); }
        }

        /* 書籍內容展示（秘境解讀區） */
        .quote-box {
            font-size: 1.25rem;
            line-height: 2.2;
            margin: 3rem 0;
            font-weight: 300;
            text-align: justify;
            text-justify: inter-ideograph;
        }

        /* 東方美學裝飾性圓點 */
        .spiritual-ornament {
            display: block;
            margin: 2rem auto;
            color: var(--text-dim);
            opacity: 0.5;
            font-size: 0.75rem;
        }

        .author-info {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 3.5rem;
        }

        /* 精緻的導購連結鈕 */
        .action-link {
            display: inline-block;
            padding: 14px 35px;
            border: 1px solid var(--text-primary);
            color: var(--bg-color);
            background: var(--text-primary);
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.95rem;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .action-link:hover {
            background: transparent;
            color: var(--text-primary);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .back-btn {
            display: block;
            margin-top: 4rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <!-- 背景動態光暈 -->
    <div class="ambient-bg">
        <div class="light-orb"></div>
    </div>

    <!-- 步驟一：入口分流 -->
    <div id="step1" class="container visible">
        <h1>心間隙</h1>
        <div class="subtitle">A secret garden in the city</div>
        
        <p class="prompt-text">今晚，是什麼把你帶來這裡？</p>
        
        <div class="emotion-grid">
            <button class="emotion-btn" onclick="processJourney('general')">很累</button>
            <button class="emotion-btn" onclick="processJourney('general')">很孤單</button>
            <button class="emotion-btn" onclick="processJourney('general')">不知道方向</button>
            <button class="emotion-btn" onclick="processJourney('relationship')">感情卡住了</button>
            <button class="emotion-btn" onclick="processJourney('relationship')">關係讓我窒息</button>
        </div>

        <div class="input-area">
            <p class="input-instruction">或者，有什麼想不通的事？</p>
            <textarea rows="1" placeholder="將心事投入水池中..." id="user-thought"></textarea>
            <button class="submit-btn" onclick="submitThought()">化為落葉，讓它漂走 →</button>
        </div>
    </div>

    <!-- 步驟二：靜心過渡（沉澱儀式） -->
    <div id="transition" class="container hidden">
        <p class="transition-text">池水泛起漣漪，正在靜靜傾聽...</p>
    </div>

    <!-- 步驟三：秘境解答（書籍導引） -->
    <div id="step3" class="container hidden">
        <span class="spiritual-ornament">✦ ✦ ✦</span>
        <div class="quote-box" id="quote-content">
            <!-- 由 JavaScript 依據選擇動態填入 -->
        </div>
        <span class="spiritual-ornament">✦ ✦ ✦</span>
        
        <div class="author-info" id="quote-source">
            <!-- 作者與書籍來源 -->
        </div>
        
        <a href="https://www.books.com.tw/" target="_blank" class="action-link" id="redirect-link">走進這條路，尋找完整的解答</a>
        
        <a class="back-btn" onclick="backToEntrance()">← 沿著微光原路返回</a>
    </div>

    <script>
        // DOM 節點控制
        const step1 = document.getElementById('step1');
        const transition = document.getElementById('transition');
        const step3 = document.getElementById('step3');
        const quoteContent = document.getElementById('quote-content');
        const quoteSource = document.getElementById('quote-source');
        const userThought = document.getElementById('user-thought');

        // 書籍智慧語錄資料庫（走靈性療癒、向內探索路線）
        const spiritualDatabase = {
            relationship: {
                text: "「那些在關係裡讓你感到快要窒息的重量，很多時候並非源自於對方的推開，而是我們內心深處那道無法直視的障礙——我們害怕走進真正的親密，卻又渴望被完整承接。正視自己無法獲得幸福的盲點，才是解開束縛的起點。」",
                source: "節錄自 陳海倫 著作《敗犬站起來》"
            },
            general: {
                text: "「不要試圖在迷霧中奔跑，那只會讓你忽略腳下的土壤。生命中的停滯期，不是失去方向，而是大地在提醒你：你需要先讓急躁的靈魂安靜坐下來，適應周遭的微光，答案自會如泉水般從心底浮現。」",
                source: "節錄自 創意出版社 精選心靈叢書"
            }
        };

        // 旅程切換邏輯
        function processJourney(type) {
            // 隱藏入口
            fadeOut(step1);
            
            // 進入靜心沉澱狀態
            setTimeout(() => {
                fadeIn(transition);
                
                // 儀式感留白 (模擬思緒沉澱 2.5 秒)
                setTimeout(() => {
                    fadeOut(transition);
                    
                    // 呈現秘境金句
                    setTimeout(() => {
                        renderQuote(type);
                        fadeIn(step3);
                    }, 800);
                    
                }, 2500);
            }, 800);
        }

        // 送出傾訴文字
        function submitThought() {
            const text = userThought.value.trim();
            if (!text) return;

            // 簡易關鍵字偵測分流
            let targetType = 'general';
            if (text.includes('伴侶') || text.includes('感情') || text.includes('愛') || text.includes('離婚') || text.includes('分手') || text.includes('關係')) {
                targetType = 'relationship';
            }

            // 清空輸入
            userThought.value = '';
            processJourney(targetType);
        }

        // 填入文字內容
        function renderQuote(type) {
            const data = spiritualDatabase[type];
            quoteContent.textContent = data.text;
            quoteSource.textContent = data.source;
        }

        // 返回入口
        function backToEntrance() {
            fadeOut(step3);
            setTimeout(() => {
                fadeIn(step1);
            }, 800);
        }

        // 精緻淡入淡出工具函數
        function fadeOut(el) {
            el.classList.remove('visible');
            el.classList.add('hidden');
        }

        function fadeIn(el) {
            el.classList.remove('hidden');
            el.classList.add('visible');
        }

        // 自動伸長輸入框的貼心體驗
        userThought.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    </script>
</body>
</html>
